# Brings up the entire Order Router stack on a fresh machine with:
#   docker compose up --build
#
# The service is self-contained (reference data is bundled in the image and
# loaded into memory at startup), so no database or extra containers are needed.
services:
  order-router:
    build:
      context: .
      dockerfile: Dockerfile
    image: synapse/order-router:1.0.0
    container_name: order-router
    ports:
      - "8080:8080"
    environment:
      # Override reference-data locations here to point at alternate datasets,
      # e.g. file:/data/suppliers.csv mounted via a volume.
      SERVER_PORT: 8080
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q -O /dev/null http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
